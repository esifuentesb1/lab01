name: Saludo

on:
  push:
    branches:
      - main
      - develop

env:
  mi_nombre: "Edy Sifuentes"

jobs:
  saludos:
    runs-on: ubuntu-latest
    steps:
      - name: Saludos desde main
        if: github.ref == 'refs/heads/main'
        run: echo "Hola desde main, soy ${{ env.mi_nombre }}"

      - name: Saludos desde develop
        if: github.ref == 'refs/heads/develop'
        run: echo "Hola desde develop, soy ${{ env.mi_nombre }}"
